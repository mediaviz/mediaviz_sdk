source: upload_photos.yaml
resolved_at: '2026-06-17T00:14:46Z'
composites:
- id: composite_upload_photo
  function_name: upload_photo
  summary: Fetch upload template (cached per project), then upload a single photo
  controller: PhotoUpload
  auth: required
  params:
  - name: project_table_name
    type: str
    required: true
  - name: company_id
    type: str
    required: true
  - name: user_id
    type: str
    required: true
  - name: photo_index
    type: int
    required: true
  - name: photo
    type: object
    required: true
    description: 'Photo object. Must have: file_content (base64), mimetype, file_path,
      title. Optional: client_side_id, blur, colors, face_recognition, image_describe,
      image_classification, image_comparison,  size, source_resolution_x, source_resolution_y,
      date_taken, latitude, longitude, resized_dimensions.

      '
  steps:
  - step_id: get_template
    execution: once
    cache:
      enabled: true
      key: upload_template:{params.project_table_name}
    input_map:
      project_table_name: params.project_table_name
    output_as: template
    endpoint:
      id: get_get_project_prelim_model_request_template
      function_name: get_project_prelim_model_request_template
      controller: Projects
      base_path: /api/v1
      method: GET
      path: /api/v1/project_outcome/{project_table_name}
      summary: get_project_prelim_model_request_template
      auth: required
      params:
      - name: project_table_name
        in: path
        type: str
        required: true
      request_body: null
      response:
        status: 200
        source: inferred
        body: dict
      content_type: null
      tags:
      - all
      hidden: false
      api_host: null
  - step_id: upload
    execution: once
    output_as: upload_result
    input_map:
      x-bucket-name: steps.template.bucket_name
      x-photo-index: params.photo_index
      x-company-id: params.company_id
      x-user-id: params.user_id
      x-project-table-name: params.project_table_name
      x-title: params.photo.title
      x-client-side-id: params.photo.client_side_id
      x-blur: params.photo.blur
      x-colors: params.photo.colors
      x-face-recognition: params.photo.face_recognition
      x-image-describe: params.photo.image_describe
      x-image-classification: params.photo.image_classification
      x-image-comparison: params.photo.image_comparison
      x-size: params.photo.size
      x-source-resolution-x: params.photo.source_resolution_x
      x-source-resolution-y: params.photo.source_resolution_y
      x-date-taken: params.photo.date_taken
      x-latitude: params.photo.latitude
      x-longitude: params.photo.longitude
      x-resized-dimensions: params.photo.resized_dimensions
      file_content: params.photo.file_content
      mimetype: params.photo.mimetype
      file_path: params.photo.file_path
    endpoint:
      id: post_upload_photo
      function_name: upload_photo_to_mediaviz
      controller: PhotoUpload
      base_path: /
      method: POST
      path: /photo_upload
      summary: Upload a preprocessed photo with metadata via headers
      auth: required
      params:
      - name: x-company-id
        in: header
        type: string
        required: true
      - name: x-user-id
        in: header
        type: string
        required: true
      - name: x-project-table-name
        in: header
        type: string
        required: true
      - name: x-client-side-id
        in: header
        type: string
        required: false
      - name: x-title
        in: header
        type: string (original filename)
        required: true
      - name: x-blur
        in: header
        type: string (bool)
        required: false
      - name: x-colors
        in: header
        type: string (bool)
        required: false
      - name: x-face-recognition
        in: header
        type: string (bool)
        required: false
      - name: x-image-describe
        in: header
        type: string (bool)
        required: false
      - name: x-image-classification
        in: header
        type: string (bool)
        required: false
      - name: x-image-comparison
        in: header
        type: string (bool)
        required: false
      - name: x-size
        in: header
        type: string (WxH original dimensions)
        required: false
      - name: x-source-resolution-x
        in: header
        type: string (EXIF x resolution)
        required: false
      - name: x-source-resolution-y
        in: header
        type: string (EXIF y resolution)
        required: false
      - name: x-date-taken
        in: header
        type: string (EXIF DateTimeOriginal)
        required: false
      - name: x-latitude
        in: header
        type: string (EXIF GPS latitude)
        required: false
      - name: x-longitude
        in: header
        type: string (EXIF GPS longitude)
        required: false
      - name: x-ocr
        in: header
        type: string
        required: false
      request_body:
        file_content:
          type: string (base64-encoded image)
          required: true
        mimetype:
          type: string (e.g. image/jpeg)
          required: true
        file_path:
          type: string (original filesystem path)
          required: true
      response: null
      content_type: application/json
      tags:
      - top
      hidden: false
      api_host: photo_upload
  returns: steps.upload_result
