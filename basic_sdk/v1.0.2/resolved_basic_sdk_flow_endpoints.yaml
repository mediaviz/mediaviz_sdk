- id: post_upload_photo
  function_name: upload_photo_to_mediaviz
  controller: PhotoUpload
  base_path: /
  method: POST
  path: /photo_upload
  summary: Upload a preprocessed photo with metadata via headers
  auth: required
  params:
  - name: x-bucket-name
    in: header
    type: string
    required: true
  - name: x-photo-index
    in: header
    type: string
    required: true
  - name: x-company-id
    in: header
    type: string
    required: true
  - name: x-user-id
    in: header
    type: string
    required: true
  - name: x-project-table-name
    in: header
    type: string
    required: true
  - name: x-client-side-id
    in: header
    type: string
    required: false
  - name: x-title
    in: header
    type: string (original filename)
    required: true
  - name: x-blur
    in: header
    type: string (bool)
    required: false
  - name: x-colors
    in: header
    type: string (bool)
    required: false
  - name: x-face-recognition
    in: header
    type: string (bool)
    required: false
  - name: x-image-classification
    in: header
    type: string (bool)
    required: false
  - name: x-image-comparison
    in: header
    type: string (bool)
    required: false
  - name: x-size
    in: header
    type: string (WxH original dimensions)
    required: false
  - name: x-source-resolution-x
    in: header
    type: string (EXIF x resolution)
    required: false
  - name: x-source-resolution-y
    in: header
    type: string (EXIF y resolution)
    required: false
  - name: x-date-taken
    in: header
    type: string (EXIF DateTimeOriginal)
    required: false
  - name: x-latitude
    in: header
    type: string (EXIF GPS latitude)
    required: false
  - name: x-longitude
    in: header
    type: string (EXIF GPS longitude)
    required: false
  - name: x-resized-dimensions
    in: header
    type: string (WxH resized dimensions, present only if image was resized)
    required: false
  request_body:
    file_content:
      type: string (base64-encoded image)
      required: true
    mimetype:
      type: string (e.g. image/jpeg)
      required: true
    file_path:
      type: string (original filesystem path)
      required: true
  response: null
  content_type: application/json
  tags:
  - top
  hidden: false
  api_host: photo_upload
