name: Update SDK

on:
  repository_dispatch:
    types: [hub-updated]
  pull_request:
    branches: [dev, qa, main]

# Group is keyed on branch AND mode so a PR-verify can never share a group with
# (and thus cancel) a propagate. cancel-in-progress is an expression: verify runs
# cancel stale verify runs (saves CI on PR pushes); propagate runs are NEVER
# cancelled — a second dispatch queues behind the in-flight one, so a publish tail
# (git push → npm → admin → PHP → Packagist) can never be torn in half.
concurrency:
  group: update-sdk-${{ github.event.client_payload.branch || github.base_ref || github.ref_name }}-${{ github.event_name == 'repository_dispatch' && 'propagate' || 'verify' }}
  cancel-in-progress: ${{ github.event_name != 'repository_dispatch' }}

permissions:
  contents: write
  id-token: write  # required for npm Trusted Publishing (OIDC)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Determine mode + branch
        id: ctx
        # branch = the channel (dev/qa/main) this run targets — drives the bump
        # flag, dist-tag, and the hub/oauth checkouts (verify validates the PR
        # against the channel's current upstream spec).
        # sdk_ref = what to check out for the mediaviz_sdk repo itself: the branch
        # in propagate; the PR HEAD in verify, so the gate actually exercises the
        # proposed generator/generate.py changes rather than the base branch.
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "mode=propagate" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.client_payload.branch }}" >> $GITHUB_OUTPUT
            echo "sdk_ref=${{ github.event.client_payload.branch }}" >> $GITHUB_OUTPUT
          else
            echo "mode=verify" >> $GITHUB_OUTPUT
            echo "branch=${{ github.base_ref }}" >> $GITHUB_OUTPUT
            echo "sdk_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MEDIAVIZ_PIPELINE_BOT_APP_ID }}
          private-key: ${{ secrets.MEDIAVIZ_PIPELINE_BOT_PRIVATE_KEY }}
          owner: mediaviz
          repositories: mediaviz_sdk,mediaviz_intelligence_hub,oauth_library,mediaviz-php-sdk

      - name: Checkout mediaviz_sdk
        uses: actions/checkout@v4
        with:
          repository: mediaviz/mediaviz_sdk
          # sdk_ref = branch (propagate) or PR head (verify) — see ctx step.
          ref: ${{ steps.ctx.outputs.sdk_ref }}
          path: mediaviz_sdk
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Checkout mediaviz_intelligence_hub
        uses: actions/checkout@v4
        with:
          repository: mediaviz/mediaviz_intelligence_hub
          ref: ${{ steps.ctx.outputs.branch }}
          path: mediaviz_intelligence_hub
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout oauth_library (branch)
        id: oauth-branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: mediaviz/oauth_library
          ref: ${{ steps.ctx.outputs.branch }}
          path: oauth_library
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout oauth_library (main fallback)
        if: steps.oauth-branch.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: mediaviz/oauth_library
          ref: main
          path: oauth_library
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install Python deps
        # httpx is the generated SDK's runtime dep (oauth_sdk imports it at load);
        # tests run inline inside generate.py, so it must be present beforehand.
        run: pip install pyyaml pytest httpx

      - name: Decide version bump flag
        id: bump
        run: |
          if [ "${{ steps.ctx.outputs.mode }}" = "propagate" ] && [ "${{ steps.ctx.outputs.branch }}" = "main" ]; then
            echo "flag=--minor-version" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi

      - name: Run SDK generator (public)
        working-directory: mediaviz_sdk
        # --endpoints omitted → uses the public_sdk_endpoints default in generate.py
        run: python generate.py ${{ steps.bump.outputs.flag }}

      - name: Run SDK generator (admin)
        working-directory: mediaviz_sdk
        # Admin SDK: JS-only, private package (publishConfig.access=restricted),
        # output under admin-sdk/ so it versions independently of the public sdk/.
        # --admin implies --endpoints all_endpoints.
        run: python generate.py --frameworks javascript --destination-dir admin-sdk --admin ${{ steps.bump.outputs.flag }}

      # ── Ensure both scoped JS packages shipped TypeScript declarations ─────
      # generate.py type-checks sdk.d.ts inline (and aborts on failure), but this
      # guard fails the run loudly if the file or its package.json `types` entry
      # is ever missing for either scoped package.
      - name: Verify TypeScript declarations present
        working-directory: mediaviz_sdk
        run: |
          assert_types() {
            local js_dir="$1" pkg="$2"
            [ -n "$js_dir" ] || { echo "::error::no generated javascript dir for $pkg"; exit 1; }
            [ -f "$js_dir/dist/sdk.d.ts" ] || { echo "::error::$pkg missing $js_dir/dist/sdk.d.ts"; exit 1; }
            [ -f "$js_dir/dist/sdk.esm.d.ts" ] || { echo "::error::$pkg missing $js_dir/dist/sdk.esm.d.ts"; exit 1; }
            [ -f "$js_dir/dist/sdk.d.cts" ] || { echo "::error::$pkg missing $js_dir/dist/sdk.d.cts"; exit 1; }
            grep -q '"types": "./dist/sdk.d.ts"' "$js_dir/package.json" || { echo "::error::$pkg package.json missing types field"; exit 1; }
            echo "$pkg: sdk.d.ts + sdk.esm.d.ts + sdk.d.cts present and advertised in package.json"
          }
          PUB=$(ls -d sdk/v*/javascript 2>/dev/null | grep -v archive | sort -V | tail -1)
          ADM=$(ls -d admin-sdk/v*/javascript 2>/dev/null | grep -v archive | sort -V | tail -1)
          assert_types "$PUB" "@mediaviz/sdk"
          assert_types "$ADM" "@mediaviz/admin-sdk"

      # ── Locate + content-hash gate ─────────────────────────────────────────
      # Each generator unconditionally archives the prior vN/ and creates a fresh
      # vN+1/, so every run produces a version-bump diff regardless of whether
      # the underlying endpoint set actually changed. To avoid no-op commits + npm
      # republishes (e.g. an admin-only external_api change would otherwise still
      # bump @mediaviz/sdk with byte-identical dist), we hash dist/ against the
      # most-recent archive entry and skip whichever side is unchanged.
      - name: Locate freshly-generated SDK dirs
        if: steps.ctx.outputs.mode == 'propagate'
        id: dirs
        run: |
          JS_DIR=$(ls -d mediaviz_sdk/sdk/v*/javascript 2>/dev/null | grep -v archive | sort -V | tail -1)
          PHP_DIR=$(ls -d mediaviz_sdk/sdk/v*/php 2>/dev/null | grep -v archive | sort -V | tail -1)
          ADMIN_JS_DIR=$(ls -d mediaviz_sdk/admin-sdk/v*/javascript 2>/dev/null | grep -v archive | sort -V | tail -1)
          VERSION=$(echo "$JS_DIR" | sed -E 's|.*sdk/v([0-9.]+)/javascript|v\1|')
          echo "js_dir=$JS_DIR" >> $GITHUB_OUTPUT
          echo "php_dir=$PHP_DIR" >> $GITHUB_OUTPUT
          echo "admin_js_dir=$ADMIN_JS_DIR" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Located JS: $JS_DIR"
          echo "Located PHP: $PHP_DIR"
          echo "Located admin JS: $ADMIN_JS_DIR"
          echo "Version: $VERSION"

      # Pure branch→dist-tag map, computed before the detect step (ungated) so the
      # registry-liveness check below can query `npm view @mediaviz/sdk@<tag>`.
      - name: Determine npm dist-tag
        if: steps.ctx.outputs.mode == 'propagate'
        id: npm-meta
        run: |
          case "${{ steps.ctx.outputs.branch }}" in
            dev)  echo "tag=dev"    >> $GITHUB_OUTPUT ;;
            qa)   echo "tag=qa"     >> $GITHUB_OUTPUT ;;
            main) echo "tag=latest" >> $GITHUB_OUTPUT ;;
          esac

      - name: Detect content changes (skip no-op publishes)
        if: steps.ctx.outputs.mode == 'propagate'
        id: changes
        run: |
          hash_dist() {
            local dir="$1"
            [ -d "$dir" ] || { echo "missing"; return; }
            find "$dir" -type f | sort | xargs cat 2>/dev/null | sha256sum | awk '{print $1}'
          }
          # Public sdk: compare new vN+1/javascript/dist against the most-recent archive entry
          NEW_PUB="${{ steps.dirs.outputs.js_dir }}/dist"
          OLD_PUB=$(ls -d mediaviz_sdk/sdk/archive/v*/javascript/dist 2>/dev/null | sort -V | tail -1)
          if [ -z "$OLD_PUB" ] || [ "$(hash_dist "$NEW_PUB")" != "$(hash_dist "$OLD_PUB")" ]; then
            echo "public_changed=true" >> $GITHUB_OUTPUT
            echo "Public dist content changed — will commit + publish sdk/."
          else
            # Content matches the prior archive, but the registry tag may still be
            # behind a prior version whose publish failed AFTER the repo was
            # committed (commit precedes publish). A content-only gate masks that
            # gap forever; verify the live dist-tag is actually in sync before
            # skipping. If behind, force publish: the fresh vN+1 (byte-identical to
            # the committed vN) is committed + published under a new version number,
            # advancing the dist-tag with no npm version collision.
            WANT=$(echo "$OLD_PUB" | sed -E 's|.*/archive/v([0-9.]+)/javascript/dist|\1|')
            LIVE=$(npm view "@mediaviz/sdk@${{ steps.npm-meta.outputs.tag }}" version 2>/dev/null || echo "")
            if [ -n "$WANT" ] && { [ -z "$LIVE" ] || [ "$(printf '%s\n%s\n' "$WANT" "$LIVE" | sort -V | tail -1)" != "$LIVE" ]; }; then
              echo "public_changed=true" >> $GITHUB_OUTPUT
              echo "Public dist content unchanged BUT registry behind (live=${LIVE:-none}, expected≥${WANT}) — forcing publish to reconcile."
            else
              echo "public_changed=false" >> $GITHUB_OUTPUT
              echo "Public dist content unchanged and registry in sync (live=${LIVE}) — skipping commit + publish for sdk/."
            fi
          fi
          # ── Admin SDK liveness caveat ──────────────────────────────────────────
          # @mediaviz/admin-sdk is published --access restricted (private). Verifying
          # its live dist-tag would require `npm view` with a read-authenticated token,
          # but this workflow authenticates publishes via OIDC Trusted Publishing and
          # carries no npm read token. So the registry-liveness gate above applies to
          # the PUBLIC package only; admin_changed below remains a pure content-hash
          # compare. Consequence: a transient admin publish failure that lands AFTER
          # the repo is committed is NOT self-healed by a later identical-content run
          # — it is masked the same way the public gate was before this change. To
          # close this, add an NPM_READ_TOKEN secret and mirror the public check here.
          NEW_ADM="${{ steps.dirs.outputs.admin_js_dir }}/dist"
          OLD_ADM=$(ls -d mediaviz_sdk/admin-sdk/archive/v*/javascript/dist 2>/dev/null | sort -V | tail -1)
          if [ -z "$OLD_ADM" ] || [ "$(hash_dist "$NEW_ADM")" != "$(hash_dist "$OLD_ADM")" ]; then
            echo "admin_changed=true" >> $GITHUB_OUTPUT
            echo "Admin dist content changed — will commit + publish admin-sdk/."
          else
            echo "admin_changed=false" >> $GITHUB_OUTPUT
            echo "Admin dist content unchanged — skipping commit + publish for admin-sdk/ (liveness check skipped: no npm read token for restricted package, see caveat above)."
          fi

      - name: Discard unchanged generator output
        # When a side's hash matches the prior archived version, revert its
        # working-tree changes so the commit step doesn't pick them up.
        # The generator moved the prior tracked vN/ into the gitignored archive/ and
        # created a fresh vN+1/ (also gitignored). `restore` brings the prior tracked
        # vN/ back; `clean -fdx` removes the ignored vN+1/ and archive/ — plain
        # `clean -fd` would skip them now that v*/ is gitignored.
        if: steps.ctx.outputs.mode == 'propagate' && (steps.changes.outputs.public_changed == 'false' || steps.changes.outputs.admin_changed == 'false')
        working-directory: mediaviz_sdk
        run: |
          if [ "${{ steps.changes.outputs.public_changed }}" = "false" ]; then
            git restore sdk/
            git clean -fdx sdk/
            echo "Reverted sdk/ — no public content diff."
          fi
          if [ "${{ steps.changes.outputs.admin_changed }}" = "false" ]; then
            git restore admin-sdk/
            git clean -fdx admin-sdk/
            echo "Reverted admin-sdk/ — no admin content diff."
          fi

      - name: Configure git identity
        if: steps.ctx.outputs.mode == 'propagate' && (steps.changes.outputs.public_changed == 'true' || steps.changes.outputs.admin_changed == 'true')
        working-directory: mediaviz_sdk
        run: |
          git config user.name "mediaviz-pipeline-bot[bot]"
          git config user.email "mediaviz-pipeline-bot[bot]@users.noreply.github.com"

      - name: Commit + push regenerated SDKs
        if: steps.ctx.outputs.mode == 'propagate' && (steps.changes.outputs.public_changed == 'true' || steps.changes.outputs.admin_changed == 'true')
        working-directory: mediaviz_sdk
        run: |
          HUB_SHORT_SHA=$(git -C ../mediaviz_intelligence_hub rev-parse --short HEAD)
          # sdk/v*/ and admin-sdk/v*/ are gitignored (never tracked locally), so the
          # fresh version must be force-added — this workflow is the only writer of
          # record. -A also stages deletion of the prior tracked version, which the
          # generator moved into the gitignored archive/. The old `git status
          # --porcelain` guard is blind to ignored paths, so gate on the staged diff.
          git add -Af sdk/ admin-sdk/
          if git diff --cached --quiet -- sdk/ admin-sdk/; then
            echo "No SDK changes to commit."
            exit 0
          fi
          git commit -m "chore(auto): regenerate SDK from intelligence_hub@${HUB_SHORT_SHA}"
          # Non-fast-forward guard: a PR merge (e.g. promotion) or out-of-order
          # dispatch can advance the branch between checkout and push. Rebase our
          # single auto-commit onto the current tip before each attempt and retry;
          # fail loudly on a real conflict rather than silently dropping the run.
          BRANCH="${{ steps.ctx.outputs.branch }}"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH" || { echo "::error::rebase conflict on $BRANCH — manual intervention needed"; exit 1; }
            if git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
            echo "Push to $BRANCH rejected (attempt ${attempt}/3) — refetching + retrying."
          done
          echo "::error::push to $BRANCH failed after 3 attempts"
          exit 1

      # ── npm + Packagist publish (gated per-package on content hash) ────────
      - name: Upgrade npm CLI (Trusted Publishing needs ≥ 11.5)
        if: steps.ctx.outputs.mode == 'propagate' && (steps.changes.outputs.public_changed == 'true' || steps.changes.outputs.admin_changed == 'true')
        run: npm install -g npm@latest

      - name: Publish @mediaviz/sdk to npm
        if: steps.ctx.outputs.mode == 'propagate' && steps.changes.outputs.public_changed == 'true'
        working-directory: ${{ steps.dirs.outputs.js_dir }}
        run: npm publish --access public --tag ${{ steps.npm-meta.outputs.tag }} --provenance

      - name: Publish @mediaviz/admin-sdk to npm
        if: steps.ctx.outputs.mode == 'propagate' && steps.changes.outputs.admin_changed == 'true'
        working-directory: ${{ steps.dirs.outputs.admin_js_dir }}
        # --access restricted matches publishConfig and keeps the admin package private even on main.
        # No --provenance: provenance writes a public Sigstore/Rekor attestation and is incompatible
        # with restricted (private) packages — npm rejects the combination with EUSAGE.
        run: npm publish --access restricted --tag ${{ steps.npm-meta.outputs.tag }}

      # ── Packagist publish (main propagate only, gated on public content change) ─
      - name: Checkout mediaviz_php_sdk
        if: steps.ctx.outputs.mode == 'propagate' && steps.ctx.outputs.branch == 'main' && steps.changes.outputs.public_changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: mediaviz/mediaviz-php-sdk
          ref: main
          path: mediaviz_php_sdk
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Sync PHP SDK → mediaviz_php_sdk + tag + push
        if: steps.ctx.outputs.mode == 'propagate' && steps.ctx.outputs.branch == 'main' && steps.changes.outputs.public_changed == 'true'
        run: |
          rsync -av --delete --exclude=.git "${{ steps.dirs.outputs.php_dir }}/" mediaviz_php_sdk/
          cd mediaviz_php_sdk
          git config user.name "mediaviz-pipeline-bot[bot]"
          git config user.email "mediaviz-pipeline-bot[bot]@users.noreply.github.com"
          VERSION="${{ steps.dirs.outputs.version }}"
          # 1. Commit + push main if content changed. Non-fast-forward-safe: rebase
          #    onto origin/main and retry (a re-run or manual edit may have advanced
          #    the companion repo); fail loudly on a real conflict. The tag is created
          #    AFTER the push so it points at the final (post-rebase) commit.
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "release ${VERSION}"
            pushed=false
            for attempt in 1 2 3; do
              git fetch origin main
              git rebase origin/main || { echo "::error::rebase conflict on mediaviz-php-sdk main — manual intervention needed"; exit 1; }
              if git push origin HEAD:main; then pushed=true; break; fi
              echo "Push to mediaviz-php-sdk main rejected (attempt ${attempt}/3) — refetching + retrying."
            done
            [ "$pushed" = true ] || { echo "::error::push to mediaviz-php-sdk main failed after 3 attempts"; exit 1; }
          else
            echo "No PHP SDK content change — main already current; ensuring release tag exists."
          fi
          # 2. Ensure the version tag exists on the remote (idempotent). Covers a
          #    re-run, or a prior run that committed/pushed main but failed before
          #    tagging — so Packagist still gets the release without a manual fixup.
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already on remote — nothing to tag."
          else
            git tag -f "${VERSION}"
            git push origin "refs/tags/${VERSION}"
            echo "Pushed tag ${VERSION}."
          fi

      - name: Trigger Packagist refresh
        if: steps.ctx.outputs.mode == 'propagate' && steps.ctx.outputs.branch == 'main' && steps.changes.outputs.public_changed == 'true'
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -fsS -XPOST -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/mediaviz/mediaviz-php-sdk"}}'
